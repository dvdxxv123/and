<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo設計比賽評分表</title>
    <style>
        /* 整体样式 */
        body {
            font-family: "Microsoft JhengHei", 微軟正黑體, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        /* 评分表容器 */
        .score-table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        /* 表头样式 */
        .score-table th {
            background-color: #2c3e50;
            color: white;
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        /* 单元格样式 */
        .score-table td {
            padding: 10px;
            text-align: center;
            border: 1px solid #ddd;
            font-size: 13px;
        }
        /* 输入框样式 */
        .score-input {
            width: 60px;
            padding: 5px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }
        /* Logo列样式 */
        .logo-column {
            width: 200px;
        }
        /* 总分列样式 */
        .total-column {
            font-weight: bold;
            color: #e74c3c;
        }
        /* 奇数行背景 */
        .score-table tr:nth-child(odd) td {
            background-color: #f9f9f9;
        }
        /* 悬停效果 */
        .score-table tr:hover td {
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>
    <h2 style="text-align: center; color: #2c3e50;">Logo設計比賽評分表</h2>
    <table class="score-table">
        <thead>
            <tr>
                <th>序號</th>
                <th class="logo-column">Logo作品</th>
                <th>理念與內涵<br>(50分)</th>
                <th>視覺美感與應用性<br>(20分)</th>
                <th>創意與創新<br>(20分)</th>
                <th>科技融合度<br>(10分)</th>
                <th class="total-column">總分<br>(100分)</th>
            </tr>
        </thead>
        <tbody>
            <!-- 第1个作品 -->
            <tr>
                <td>1</td>
                <td>Logo圖片展示區</td>
                <td><input type="number" class="score-input" min="0" max="50" placeholder="0-50"></td>
                <td><input type="number" class="score-input" min="0" max="20" placeholder="0-20"></td>
                <td><input type="number" class="score-input" min="0" max="20" placeholder="0-20"></td>
                <td><input type="number" class="score-input" min="0" max="10" placeholder="0-10"></td>
                <td class="total-column" id="total-1">0</td>
            </tr>
            <!-- 第2个作品 -->
            <tr>
                <td>2</td>
                <td>Logo圖片展示區</td>
                <td><input type="number" class="score-input" min="0" max="50" placeholder="0-50"></td>
                <td><input type="number" class="score-input" min="0" max="20" placeholder="0-20"></td>
                <td><input type="number" class="score-input" min="0" max="20" placeholder="0-20"></td>
                <td><input type="number" class="score-input" min="0" max="10" placeholder="0-10"></td>
                <td class="total-column" id="total-2">0</td>
            </tr>
            <!-- 第3个作品 -->
            <tr>
                <td>3</td>
                <td>Logo圖片展示區</td>
                <td><input type="number" class="score-input" min="0" max="50" placeholder="0-50"></td>
                <td><input type="number" class="score-input" min="0" max="20" placeholder="0-20"></td>
                <td><input type="number" class="score-input" min="0" max="20" placeholder="0-20"></td>
                <td><input type="number" class="score-input" min="0" max="10" placeholder="0-10"></td>
                <td class="total-column" id="total-3">0</td>
            </tr>
            <!-- 可複製上方tr區塊增加更多作品行 -->
        </tbody>
    </table>

    <script>
        // 自动计算总分的功能
        document.addEventListener('DOMContentLoaded', function() {
            // 获取所有评分输入框
            const scoreInputs = document.querySelectorAll('.score-input');
            
            scoreInputs.forEach(input => {
                input.addEventListener('input', function() {
                    // 获取当前行的所有输入框
                    const row = this.closest('tr');
                    const inputs = row.querySelectorAll('.score-input');
                    let total = 0;
                    
                    // 遍历计算总分
                    inputs.forEach(inp => {
                        const value = parseFloat(inp.value) || 0;
                        // 限制输入值在评分范围内
                        if (value > parseInt(inp.max)) inp.value = inp.max;
                        if (value < parseInt(inp.min)) inp.value = inp.min;
                        total += parseFloat(inp.value) || 0;
                    });
                    
                    // 显示总分
                    const totalCell = row.querySelector('.total-column');
                    totalCell.textContent = total;
                });
            });
        });
    </script>
</body>
</html>
